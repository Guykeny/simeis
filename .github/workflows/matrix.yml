name: Matrix Build Verification

on:
  pull_request:
    branches: [ main ]

jobs:
  build-matrix:
    name: Build on ${{ matrix.os }} (Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Consigne 1.3 : Un job qui fail interrompt tous les autres
      fail-fast: true
      matrix:
        # Consigne 2 : Tester sur macos, ubuntu et windows
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Consigne 2 : Tester sur les versions spécifiques de Rust
        rust: [1.85.0, 1.88.0]

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      
      # Consigne 1.1 : Système de cache
      - uses: Swatinem/rust-cache@v2
        with:
          # Clé unique par OS/Version pour éviter les conflits de cache
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Build release
        # On utilise cargo directement au lieu de make pour garantir la compatibilité Windows/Mac
        run: cargo build --release
